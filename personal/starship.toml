# Minimal prompt inspired by af-magic, without Oh My Zsh.
# Docs: https://starship.rs/config/

format = "$directory$git_branch$git_status$character"

[directory]
style = "cyan"
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = "[($branch)]($style) "
style = "bright-blue"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "yellow"
disabled = false

[character]
success_symbol = "[»](purple)"
error_symbol = "[»](red)"
